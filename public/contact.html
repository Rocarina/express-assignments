<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header>

        <h1>Contact Us</h1>

        <p>

            We'd love to hear from you.

        </p>

    </header>

    <nav>

        <a href="/">Home</a>

        <a href="/contact">Contact</a>

        <a href="/users">Users</a>

        <a href="/weather">Weather API</a>

    </nav>

    <form id="contactForm">

        <label for="name">

            Full Name

        </label>

        <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            required
        >

        <label for="email">

            Email Address

        </label>

        <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
        >

        <label for="message">

            Message

        </label>

        <textarea
            id="message"
            placeholder="Write your message here..."
            required
        ></textarea>

        <button type="submit">

            Send Message

        </button>

        <p id="successMessage"></p>

    </form>

    <footer>

        <p>

            Email : tanviverlecar14@gmail.com

        </p>

        <p>

            Full Stack Developer Internship • Day 12

        </p>

    </footer>

</div>

<script>

const form = document.getElementById("contactForm");

const successMessage = document.getElementById("successMessage");

form.addEventListener("submit", function(event){

    event.preventDefault();

    successMessage.innerHTML = "Your message has been submitted successfully.";

    successMessage.style.color = "green";

    form.reset();

});

</script>

</body>

</html>
